version: "3.8"

services:
  backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./tradeloop.db
      - ENVIRONMENT=development
      - FRONTEND_URL=http://localhost:5173
    volumes:
      - ./app:/app/app
      - ./tradeloop.db:/app/tradeloop.db
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    image: node:20-alpine
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "npm install && npx vite --host 0.0.0.0 --port 5173"
    depends_on:
      - backend
